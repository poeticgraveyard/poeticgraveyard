  <style>
/* ============================================================
   POETIC GRAVEYARD — Production Stylesheet
   Dark Academia Literary Archive | Burgundy Accents
   ============================================================ */

/* ── 1. CSS Variables ── */
:root {
  --black: #0e0b08;
  --charcoal: #1f1b18;
  --charcoal-mid: #2a2421;
  --charcoal-light: #362f2b;
  --smoke: #4a423e;
  --ash: #8a827e;
  --dust: #b5ada9;
  --mist: #ddd8d3;
  --parchment: #F7F1EA;
  --cream: #FBF7F2;
  --burgundy: #8B1E3F;
  --burgundy-dark: #5C1828;
  --burgundy-light: #A83D55;
  --wine: #943045;
  --crimson: #C4677A;
  --rose-muted: #D4778A;
  --gold: #D4B07A;
  --gold-light: #E6D3A3;
  --serif: 'Cormorant Garamond', 'Georgia', serif;
  --display: 'Playfair Display', 'Georgia', serif;
  --body: 'Crimson Pro', 'Georgia', serif;
}

/* ── 2. Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--parchment);
  font-family: var(--body);
  font-size: 18px;
  line-height: 1.7;
  overflow-x: hidden;
  cursor: default;
}
::selection { background: var(--burgundy); color: var(--cream); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--charcoal); }
::-webkit-scrollbar-thumb { background: var(--burgundy); border-radius: 3px; }

/* ── 3. Navigation ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0 2.5rem; height: 70px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.4s, backdrop-filter 0.4s, border-color 0.4s;
  border-bottom: 1px solid transparent;
}
nav.scrolled {
  background: rgba(10, 8, 6, 0.92);
  backdrop-filter: blur(18px);
  border-color: rgba(139, 30, 63, 0.4);
}
.nav-logo {
  font-family: var(--display); font-size: 1.3rem; font-weight: 700;
  letter-spacing: 0.03em; color: var(--cream); text-decoration: none;
  display: flex; align-items: center; gap: 0.6rem;
}
.nav-logo .logo-icon {
  width: 28px; height: 28px; background: var(--burgundy); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0;
}
.nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
.nav-links a {
  font-family: var(--serif); font-size: 0.95rem; letter-spacing: 0.06em;
  color: var(--dust); text-decoration: none; text-transform: uppercase;
  transition: color 0.3s; position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 1px;
  background: var(--burgundy-light); transform: scaleX(0); transform-origin: left; transition: transform 0.3s;
}
.nav-links a:hover, .nav-links a.active { color: var(--cream); }
.nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }
.nav-cta {
  font-family: var(--serif); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.55rem 1.4rem; background: var(--burgundy); color: var(--cream) !important;
  border-radius: 2px; text-decoration: none; transition: background 0.3s, transform 0.2s;
}
.nav-cta:hover { background: var(--burgundy-light) !important; transform: translateY(-1px); }
.nav-cta::after { display: none !important; }
.hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
.hamburger span { display: block; width: 24px; height: 1.5px; background: var(--parchment); transition: transform 0.3s, opacity 0.3s; }

/* ── 4. Hero Section ── */
.hero {
  position: relative; min-height: 100vh; display: flex; align-items: center;
  justify-content: center; text-align: center; overflow: hidden; padding: 100px 2rem 60px;
}
.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(139, 30, 63, 0.32) 0%, transparent 70%),
              radial-gradient(ellipse 60% 50% at 50% 50%, rgba(139, 30, 63, 0.14) 0%, transparent 60%),
              radial-gradient(ellipse 40% 40% at 80% 20%, rgba(230, 211, 163, 0.10) 0%, transparent 60%),
              radial-gradient(circle at 3% 80%, rgba(255, 200, 80, 0.05) 0%, transparent 40%),
              radial-gradient(circle at 97% 80%, rgba(255, 200, 80, 0.05) 0%, transparent 40%),
              var(--black);
}
.hero-texture {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(139, 30, 63, 0.04) 60px, rgba(139, 30, 63, 0.04) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(139, 30, 63, 0.03) 80px, rgba(139, 30, 63, 0.03) 81px);
  pointer-events: none;
}
#particle-canvas { position: absolute; inset: 0; pointer-events: none; }
.hero-content { position: relative; z-index: 2; max-width: 860px; }
.hero-eyebrow {
  font-family: var(--serif); font-size: 0.8rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--rose-muted); margin-bottom: 1.5rem;
  opacity: 0; animation: fadeUp 1s 0.3s forwards;
}
.hero-title {
  font-family: var(--display); font-size: clamp(3.5rem, 9vw, 7.5rem);
  font-weight: 700; line-height: 1.0; letter-spacing: -0.01em;
  color: var(--cream); margin-bottom: 1.2rem;
  opacity: 0; animation: fadeUp 1.1s 0.5s forwards, titleBreathe 6s ease-in-out 2s infinite;
}
.hero-title em { font-style: italic; color: var(--rose-muted); }
.hero-divider {
  display: flex; align-items: center; justify-content: center; gap: 1rem;
  margin: 1.5rem auto; opacity: 0; animation: fadeUp 1s 0.7s forwards;
}
.hero-divider span {
  display: block; width: 60px; height: 1px;
  background: linear-gradient(to right, transparent, var(--burgundy));
  box-shadow: 0 0 8px rgba(196, 103, 122, 0.35);
}
.hero-divider span:last-child {
  background: linear-gradient(to left, transparent, var(--burgundy));
  box-shadow: 0 0 8px rgba(196, 103, 122, 0.35);
}
.hero-divider svg { color: var(--burgundy); }
.hero-subtitle {
  font-family: var(--display); font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  font-style: italic; font-weight: 400; color: var(--mist);
  margin-bottom: 1rem; opacity: 0; animation: fadeUp 1s 0.9s forwards;
}
.hero-desc {
  font-family: var(--body); font-size: clamp(1rem, 2vw, 1.15rem);
  color: var(--ash); max-width: 520px; margin: 0 auto 2.5rem;
  opacity: 0; animation: fadeUp 1s 1.1s forwards;
}
.hero-buttons {
  display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap;
  opacity: 0; animation: fadeUp 1s 1.3s forwards;
}
